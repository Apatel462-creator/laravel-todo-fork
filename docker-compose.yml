version: "3.9"

services:

  app:
    image: ${IMAGE_NAME}:${IMAGE_TAG:-latest}
    container_name: ${APP_CONTAINER_NAME}
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE}
    ports:
      - "${APP_PORT}:80"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - laravel-network

  horizon:
    image: ${IMAGE_NAME}:${IMAGE_TAG:-latest}
    container_name: ${HORIZON_CONTAINER_NAME}
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE}
    command: php artisan horizon
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - laravel-network

  mysql:
    image: mysql:8.4
    container_name: ${MYSQL_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - laravel-network

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - laravel-network

networks:
  laravel-network:
    driver: bridge

volumes:
  mysql_data: